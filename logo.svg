<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- ASTRA Logo - The Invisible Guardian -->
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="innerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f8fafc" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer shield -->
  <path d="M256 32L448 128V384L256 480L64 384V128L256 32Z" 
        fill="url(#shieldGradient)" 
        stroke="#1e40af" 
        stroke-width="8" 
        filter="url(#glow)" />
  
  <!-- Inner shield -->
  <path d="M256 64L416 144V368L256 448L96 368V144L256 64Z" 
        fill="url(#innerGradient)" 
        stroke="#dbeafe" 
        stroke-width="4" />
  
  <!-- A letter (subtle) -->
  <path d="M256 192L320 256L256 320L192 256L256 192Z" 
        fill="#2563eb" 
        opacity="0.8" />
  
  <!-- Center dot (eye of the guardian) -->
  <circle cx="256" cy="256" r="32" fill="#3b82f6">
    <animate attributeName="r" values="32;36;32" dur="2s" repeatCount="indefinite" />
  </circle>
  
  <!-- Protective rings -->
  <circle cx="256" cy="256" r="96" stroke="#60a5fa" stroke-width="2" stroke-dasharray="4 4" fill="none" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" dur="20s" repeatCount="indefinite" />
  </circle>
  
  <circle cx="256" cy="256" r="128" stroke="#93c5fd" stroke-width="1" stroke-dasharray="2 2" fill="none" opacity="0.3">
    <animateTransform attributeName="transform" type="rotate" from="360 256 256" to="0 256 256" dur="30s" repeatCount="indefinite" />
  </circle>
  
  <!-- Subtle stars (protection points) -->
  <g opacity="0.7">
    <circle cx="128" cy="128" r="4" fill="#ffffff">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite" />
    </circle>
    <circle cx="384" cy="128" r="4" fill="#ffffff">
      <animate attributeName="opacity" values="0.7;0.3;0.7" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="128" cy="384" r="4" fill="#ffffff">
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="5s" repeatCount="indefinite" />
    </circle>
    <circle cx="384" cy="384" r="4" fill="#ffffff">
      <animate attributeName="opacity" values="0.9;0.5;0.9" dur="6s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- Text: ASTRA -->
  <text x="256" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#1e40af">
    ASTRA
  </text>
  <text x="256" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#3b82f6" opacity="0.8">
    The Invisible Guardian
  </text>
</svg>