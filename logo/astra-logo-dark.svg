<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="astra-gradient-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <filter id="shadow-dark" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="#0f172a" />
  
  <!-- Outer shield -->
  <path d="M100,20 C140,20 180,40 180,80 C180,120 140,160 100,180 C60,160 20,120 20,80 C20,40 60,20 100,20 Z" 
        fill="url(#astra-gradient-dark)" filter="url(#shadow-dark)" />
  
  <!-- Orbital rings -->
  <circle cx="100" cy="100" r="60" fill="none" stroke="#60a5fa" stroke-width="2" stroke-opacity="0.4" />
  <circle cx="100" cy="100" r="45" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-opacity="0.3" />
  <circle cx="100" cy="100" r="30" fill="none" stroke="#60a5fa" stroke-width="1" stroke-opacity="0.2" />
  
  <!-- Central A symbol -->
  <path d="M100,60 L120,120 L110,120 L100,90 L90,120 L80,120 Z" fill="#f1f5f9" />
  <path d="M95,105 L105,105 L100,115 Z" fill="#10b981" />
  
  <!-- Stars -->
  <g fill="#f1f5f9" opacity="0.9">
    <circle cx="40" cy="50" r="2" />
    <circle cx="160" cy="50" r="2" />
    <circle cx="60" cy="150" r="2" />
    <circle cx="140" cy="150" r="2" />
    <circle cx="30" cy="100" r="1.5" />
    <circle cx="170" cy="100" r="1.5" />
  </g>
  
  <!-- Glow effect -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#3b82f6" stroke-width="20" stroke-opacity="0.15" />
</svg>